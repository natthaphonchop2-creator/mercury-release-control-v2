name: Mercury release-control v2 CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  required:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Checkout candidate without persisted credentials
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      - name: Install uv 0.11.9
        uses: astral-sh/setup-uv@e58605a9b6da7c637471fab8847a5e5a6b8df081
        with:
          version: 0.11.9
      - name: Install locked dependencies
        run: uv sync --group dev --frozen
      - name: Run static and unit gates
        run: |
          uv run ruff check .
          uv run pytest -q
