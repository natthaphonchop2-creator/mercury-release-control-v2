name: Mercury v0.2.2 trusted immutable publication

on:
  workflow_dispatch:
    inputs:
      reviewed_commit_sha:
        description: Exact reviewed mercury-tools main commit
        required: true
        type: string
      mercury_run_id:
        description: Successful Mercury release workflow run ID
        required: true
        type: string
      mercury_run_attempt:
        description: Successful Mercury release workflow attempt
        required: true
        type: string
      handoff_artifact_id:
        description: Attempt-bound release-ready artifact ID
        required: true
        type: string
      handoff_artifact_digest:
        description: Release-ready artifact SHA-256 digest without prefix
        required: true
        type: string
      handoff_payload_sha256:
        description: SHA-256 of mercury-v0.2.2-release-ready.json
        required: true
        type: string
      release_bundle_artifact_id:
        description: Attempt-bound release bundle artifact ID
        required: true
        type: string
      release_bundle_artifact_digest:
        description: Release bundle artifact SHA-256 digest without prefix
        required: true
        type: string

permissions:
  actions: read
  contents: read

jobs:
  publish:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    environment: production-release
    steps:
      - name: Checkout exact trusted publisher implementation
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.sha }}
          fetch-depth: 1
          persist-credentials: false
      - name: Install uv 0.11.9
        uses: astral-sh/setup-uv@e58605a9b6da7c637471fab8847a5e5a6b8df081
        with:
          version: 0.11.9
      - name: Bind trusted implementation and install locked dependencies
        run: |
          set -euo pipefail
          umask 077
          test "$GITHUB_REF" = "refs/heads/main"
          test "$(git rev-parse HEAD)" = "$GITHUB_SHA"
          test -z "$(git status --porcelain)"
          uv sync --frozen
          install -d -m 700 \
            "$RUNNER_TEMP/mercury-publish/handoff" \
            "$RUNNER_TEMP/mercury-publish/assets" \
            "$RUNNER_TEMP/mercury-publish/control"
      - name: Reverify protected environment and GitHub policy
        env:
          RELEASE_CONTROL_PREFLIGHT_TOKEN: ${{ secrets.RELEASE_CONTROL_PREFLIGHT_TOKEN }}
        run: |
          set -euo pipefail
          uv run python -m mercury_release_control.workflow preflight \
            --policy policy-v0.2.2.json \
            --output "$RUNNER_TEMP/mercury-publish/preflight.json"
      - name: Verify exact Mercury run and artifact metadata
        env:
          BUNDLE_DIGEST: ${{ inputs.release_bundle_artifact_digest }}
          BUNDLE_ID: ${{ inputs.release_bundle_artifact_id }}
          GH_TOKEN: ${{ secrets.MERCURY_TARGET_REPOSITORY_TOKEN }}
          HANDOFF_DIGEST: ${{ inputs.handoff_artifact_digest }}
          HANDOFF_ID: ${{ inputs.handoff_artifact_id }}
          HANDOFF_PAYLOAD_SHA256: ${{ inputs.handoff_payload_sha256 }}
          MERCURY_RUN_ATTEMPT: ${{ inputs.mercury_run_attempt }}
          MERCURY_RUN_ID: ${{ inputs.mercury_run_id }}
          REVIEWED_SHA: ${{ inputs.reviewed_commit_sha }}
          TARGET_REPOSITORY: ${{ vars.TARGET_REPOSITORY }}
        run: |
          set -euo pipefail
          [[ "$REVIEWED_SHA" =~ ^[0-9a-f]{40}$ ]]
          [[ "$MERCURY_RUN_ID" =~ ^[1-9][0-9]*$ ]]
          [[ "$MERCURY_RUN_ATTEMPT" =~ ^[1-9][0-9]*$ ]]
          [[ "$HANDOFF_ID" =~ ^[1-9][0-9]*$ ]]
          [[ "$BUNDLE_ID" =~ ^[1-9][0-9]*$ ]]
          [[ "$HANDOFF_DIGEST" =~ ^[0-9a-f]{64}$ ]]
          [[ "$BUNDLE_DIGEST" =~ ^[0-9a-f]{64}$ ]]
          [[ "$HANDOFF_PAYLOAD_SHA256" =~ ^[0-9a-f]{64}$ ]]
          test "$TARGET_REPOSITORY" = "$(jq -er '.reviewed_repository' policy-v0.2.2.json)"
          TARGET_ID="$(jq -er '.reviewed_repository_id' policy-v0.2.2.json)"
          gh api "repos/$TARGET_REPOSITORY/actions/runs/$MERCURY_RUN_ID" \
            >"$RUNNER_TEMP/mercury-publish/mercury-run.json"
          jq -e \
            --arg sha "$REVIEWED_SHA" \
            --argjson attempt "$MERCURY_RUN_ATTEMPT" \
            --argjson repository_id "$TARGET_ID" \
            '.repository.id == $repository_id and .head_repository.id == $repository_id and
             .head_sha == $sha and .head_branch == "main" and
             .path == ".github/workflows/release-v0.2.2.yml" and
             .event == "workflow_dispatch" and .status == "completed" and
             .conclusion == "success" and .run_attempt == $attempt' \
            "$RUNNER_TEMP/mercury-publish/mercury-run.json" >/dev/null
          gh api "repos/$TARGET_REPOSITORY/actions/artifacts/$HANDOFF_ID" \
            >"$RUNNER_TEMP/mercury-publish/handoff-artifact.json"
          jq -e \
            --arg digest "sha256:$HANDOFF_DIGEST" \
            --arg name "mercury-v0.2.2-release-ready-$MERCURY_RUN_ID-attempt-$MERCURY_RUN_ATTEMPT" \
            --arg sha "$REVIEWED_SHA" \
            --argjson artifact_id "$HANDOFF_ID" \
            --argjson repository_id "$TARGET_ID" \
            --argjson run_id "$MERCURY_RUN_ID" \
            '.id == $artifact_id and .name == $name and .digest == $digest and
             .expired == false and .workflow_run.id == $run_id and
             .workflow_run.repository_id == $repository_id and
             .workflow_run.head_sha == $sha' \
            "$RUNNER_TEMP/mercury-publish/handoff-artifact.json" >/dev/null
          gh api "repos/$TARGET_REPOSITORY/actions/artifacts/$BUNDLE_ID" \
            >"$RUNNER_TEMP/mercury-publish/bundle-artifact.json"
          jq -e \
            --arg digest "sha256:$BUNDLE_DIGEST" \
            --arg name "mercury-v0.2.2-release-artifacts-$MERCURY_RUN_ID-attempt-$MERCURY_RUN_ATTEMPT" \
            --arg sha "$REVIEWED_SHA" \
            --argjson artifact_id "$BUNDLE_ID" \
            --argjson repository_id "$TARGET_ID" \
            --argjson run_id "$MERCURY_RUN_ID" \
            '.id == $artifact_id and .name == $name and .digest == $digest and
             .expired == false and .workflow_run.id == $run_id and
             .workflow_run.repository_id == $repository_id and
             .workflow_run.head_sha == $sha' \
            "$RUNNER_TEMP/mercury-publish/bundle-artifact.json" >/dev/null
      - name: Download exact release-ready handoff
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          artifact-ids: ${{ inputs.handoff_artifact_id }}
          github-token: ${{ secrets.MERCURY_TARGET_REPOSITORY_TOKEN }}
          path: ${{ runner.temp }}/mercury-publish/handoff
          repository: ${{ vars.TARGET_REPOSITORY }}
          run-id: ${{ inputs.mercury_run_id }}
      - name: Strictly inspect handoff and derive trusted control identity
        env:
          BUNDLE_DIGEST: ${{ inputs.release_bundle_artifact_digest }}
          BUNDLE_ID: ${{ inputs.release_bundle_artifact_id }}
          HANDOFF_PAYLOAD_SHA256: ${{ inputs.handoff_payload_sha256 }}
          MERCURY_RUN_ATTEMPT: ${{ inputs.mercury_run_attempt }}
          MERCURY_RUN_ID: ${{ inputs.mercury_run_id }}
          REVIEWED_SHA: ${{ inputs.reviewed_commit_sha }}
        run: |
          set -euo pipefail
          HANDOFF="$RUNNER_TEMP/mercury-publish/handoff/mercury-v0.2.2-release-ready.json"
          test "$(find "$RUNNER_TEMP/mercury-publish/handoff" -type f | wc -l)" -eq 1
          uv run python -m mercury_release_control.publish_workflow inspect-handoff \
            --control-commit "$GITHUB_SHA" \
            --handoff "$HANDOFF" \
            --handoff-payload-sha256 "$HANDOFF_PAYLOAD_SHA256" \
            --mercury-run-attempt "$MERCURY_RUN_ATTEMPT" \
            --mercury-run-id "$MERCURY_RUN_ID" \
            --output "$RUNNER_TEMP/mercury-publish/identity.json" \
            --policy policy-v0.2.2.json \
            --release-bundle-artifact-digest "$BUNDLE_DIGEST" \
            --release-bundle-artifact-id "$BUNDLE_ID" \
            --reviewed-sha "$REVIEWED_SHA"
      - name: Verify original control run and attestation artifact metadata
        id: control
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          IDENTITY="$RUNNER_TEMP/mercury-publish/identity.json"
          CONTROL_RUN_ID="$(jq -er '.control_run_id' "$IDENTITY")"
          CONTROL_RUN_ATTEMPT="$(jq -er '.control_run_attempt' "$IDENTITY")"
          CONTROL_ARTIFACT_ID="$(jq -er '.control_artifact_id' "$IDENTITY")"
          CONTROL_ARTIFACT_DIGEST="$(jq -er '.control_artifact_digest' "$IDENTITY")"
          test "$(jq -er '.control_repository_id' "$IDENTITY")" = "$GITHUB_REPOSITORY_ID"
          test "$(jq -er '.control_commit' "$IDENTITY")" = "$GITHUB_SHA"
          gh api "repos/$GITHUB_REPOSITORY/actions/runs/$CONTROL_RUN_ID" \
            >"$RUNNER_TEMP/mercury-publish/control-run.json"
          jq -e \
            --arg sha "$GITHUB_SHA" \
            --argjson attempt "$CONTROL_RUN_ATTEMPT" \
            --argjson repository_id "$GITHUB_REPOSITORY_ID" \
            '.repository.id == $repository_id and .head_repository.id == $repository_id and
             .head_sha == $sha and .head_branch == "main" and
             .path == ".github/workflows/attest-v0.2.2.yml" and
             .event == "workflow_dispatch" and .status == "completed" and
             .conclusion == "success" and .run_attempt == $attempt' \
            "$RUNNER_TEMP/mercury-publish/control-run.json" >/dev/null
          gh api "repos/$GITHUB_REPOSITORY/actions/artifacts/$CONTROL_ARTIFACT_ID" \
            >"$RUNNER_TEMP/mercury-publish/control-artifact.json"
          jq -e \
            --arg digest "sha256:$CONTROL_ARTIFACT_DIGEST" \
            --arg name "mercury-v0.2.2-attestation-$CONTROL_RUN_ID-attempt-$CONTROL_RUN_ATTEMPT" \
            --arg sha "$GITHUB_SHA" \
            --argjson artifact_id "$CONTROL_ARTIFACT_ID" \
            --argjson repository_id "$GITHUB_REPOSITORY_ID" \
            --argjson run_id "$CONTROL_RUN_ID" \
            '.id == $artifact_id and .name == $name and .digest == $digest and
             .expired == false and .workflow_run.id == $run_id and
             .workflow_run.repository_id == $repository_id and
             .workflow_run.head_sha == $sha' \
            "$RUNNER_TEMP/mercury-publish/control-artifact.json" >/dev/null
          printf 'artifact-id=%s\n' "$CONTROL_ARTIFACT_ID" >>"$GITHUB_OUTPUT"
          printf 'run-id=%s\n' "$CONTROL_RUN_ID" >>"$GITHUB_OUTPUT"
      - name: Download exact original control attestation
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          artifact-ids: ${{ steps.control.outputs.artifact-id }}
          github-token: ${{ github.token }}
          path: ${{ runner.temp }}/mercury-publish/control
          repository: ${{ github.repository }}
          run-id: ${{ steps.control.outputs.run-id }}
      - name: Download exact Mercury release bundle
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          artifact-ids: ${{ inputs.release_bundle_artifact_id }}
          github-token: ${{ secrets.MERCURY_TARGET_REPOSITORY_TOKEN }}
          path: ${{ runner.temp }}/mercury-publish/assets
          repository: ${{ vars.TARGET_REPOSITORY }}
          run-id: ${{ inputs.mercury_run_id }}
      - name: Publish draft-verified immutable release
        env:
          HANDOFF_PAYLOAD_SHA256: ${{ inputs.handoff_payload_sha256 }}
          MERCURY_TARGET_REPOSITORY_TOKEN: ${{ secrets.MERCURY_TARGET_REPOSITORY_TOKEN }}
        run: |
          set -euo pipefail
          test "$(find "$RUNNER_TEMP/mercury-publish/control" -type f | wc -l)" -eq 1
          uv run python -m mercury_release_control.publish_workflow publish \
            --assets "$RUNNER_TEMP/mercury-publish/assets" \
            --handoff "$RUNNER_TEMP/mercury-publish/handoff/mercury-v0.2.2-release-ready.json" \
            --handoff-payload-sha256 "$HANDOFF_PAYLOAD_SHA256" \
            --identity "$RUNNER_TEMP/mercury-publish/identity.json" \
            --original-attestation "$RUNNER_TEMP/mercury-publish/control/trusted-hosted-attestation.json" \
            --output "$RUNNER_TEMP/mercury-publish/publication-receipt.json" \
            --policy policy-v0.2.2.json \
            --release-notes release-notes-v0.2.2.md
      - name: Verify anonymous public tag and plugin surface
        env:
          REVIEWED_SHA: ${{ inputs.reviewed_commit_sha }}
          TARGET_REPOSITORY: ${{ vars.TARGET_REPOSITORY }}
        run: |
          set -euo pipefail
          unset GH_TOKEN GITHUB_TOKEN
          REMOTE="https://github.com/$TARGET_REPOSITORY.git"
          test "$(git ls-remote "$REMOTE" 'refs/tags/v0.2.2^{}' | awk '{print $1}')" = "$REVIEWED_SHA"
          git clone --quiet --depth 1 --branch v0.2.2 "$REMOTE" \
            "$RUNNER_TEMP/mercury-publish/public-clone"
          test "$(git -C "$RUNNER_TEMP/mercury-publish/public-clone" rev-parse HEAD)" = "$REVIEWED_SHA"
          test -f "$RUNNER_TEMP/mercury-publish/public-clone/plugins/mercury-finance/.codex-plugin/plugin.json"
          test -f "$RUNNER_TEMP/mercury-publish/public-clone/plugins/mercury-finance/.mcp.json"
          grep -F 'version = "0.2.2"' \
            "$RUNNER_TEMP/mercury-publish/public-clone/pyproject.toml" >/dev/null
